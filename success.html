<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | NIKSGLOBAL CAPITAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hz-primary: #1877F2; 
            --hz-primary-hover: #166fe5;
            --hz-text-main: #ffffff; 
            --hz-text-muted: #8b92a5; 
            --glass-bg: rgba(20, 24, 30, 0.6); 
            --glass-border: rgba(255, 255, 255, 0.1); 
            --font-sans: 'Inter', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; font-family: var(--font-sans);
            color: var(--hz-text-main); height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background: #020203;
        }

        /* Ambient Background */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=1920&q=80') center/cover;
            z-index: -2; opacity: 0.25;
        }
        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, rgba(5, 10, 20, 0.96), rgba(10, 15, 25, 0.92)); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: -1;
        }

        .success-container {
            background: var(--glass-bg);
            border: 1px solid var(--hz-primary);
            padding: 60px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(24, 119, 242, 0.2);
            animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            backdrop-filter: blur(25px);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-wrapper {
            width: 80px; height: 80px;
            background: rgba(24, 119, 242, 0.15);
            color: var(--hz-primary);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem;
            margin: 0 auto 25px;
            border: 1px solid rgba(24, 119, 242, 0.3);
            box-shadow: 0 0 20px rgba(24, 119, 242, 0.4);
        }

        h1 { font-size: 2rem; margin: 0 0 15px; font-weight: 700; letter-spacing: -0.5px; }
        p { color: var(--hz-text-muted); font-size: 1.05rem; line-height: 1.6; margin: 0 0 35px; }

        .btn-home {
            background: var(--hz-primary); color: #fff;
            padding: 16px 35px; border-radius: 50px; text-decoration: none;
            font-size: 1rem; font-weight: 600; display: inline-flex; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .btn-home:hover {
            background: var(--hz-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(24, 119, 242, 0.4);
        }

        /* Branding */
        .brand {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            opacity: 0.6;
        }
        .brand img { height: 30px; filter: drop-shadow(0 0 4px rgba(255,255,255,0.2)); }

    </style>
</head>
<body>

    <div class="brand">
        <img src="https://res.cloudinary.com/dozcviag7/image/upload/v1774248121/NiksGlobal_Capital-01_dzbqx3.png" alt="NIKSGLOBAL">
    </div>

    <div class="success-container">
        <div class="icon-wrapper">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1>Transmission Secure</h1>
        <p>Your project deck and inquiry have been securely transmitted. Our B2B Acquisitions team will review your files and contact you shortly.</p>
        <a href="index.html" class="btn-home">Return to Global Gateway <i class="fa-solid fa-arrow-right"></i></a>
    </div>

</body>
</html>
