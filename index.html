<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKSGLOBAL CAPITAL | Select Your Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* The True Light vs Dark Blue Vibe */
            --light-blue: #00d2ff; 
            --dark-blue: #002277;  
            --font-main: 'Inter', sans-serif;
            /* Enhanced cinematic easing curve */
            --easing: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: var(--font-main); background: #020203; color: #fff; }

        /* --- GLOBAL BRANDING HEADER --- */
        .brand-header {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 12px;
            pointer-events: none; animation: fadeInDown 1s var(--easing) forwards;
        }
        
        /* --- PREMIUM TRUE GLASS LOGO WITH GLOW --- */
        .premium-logo {
            background: rgb(249, 249, 249); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 8px 20px; 
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(10, 132, 255, 0.25), 0 10px 40px rgba(0, 0, 0, 0.7);
        }
        .premium-logo img {
            height: 45px; 
            display: block;
            background: transparent !important; 
            padding: 0 !important;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.2));
        }

        .brand-header span { 
            font-size: 0.85rem; font-weight: 700; letter-spacing: 6px; 
            text-transform: uppercase; color: #fff; opacity: 0.9; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translate(-50%, -30px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* --- CUSTOM WORLD MAP BACKGROUND --- */
        .map-bg {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            /* Updated to your custom Cloudinary Map */
            background: url('https://res.cloudinary.com/dozcviag7/image/upload/v1774257415/World_Map_1_uofv9v.png') center/cover no-repeat;
            /* INCREASED OPACITY so the map is clearly visible */
            opacity: 0.3; 
            z-index: 0; pointer-events: none;
            /* Removed the invert filter so your image colors remain true */
            animation: slowPan 40s linear infinite alternate;
        }
        @keyframes slowPan {
            0% { transform: scale(1.05) translate(0, 0); }
            100% { transform: scale(1.15) translate(-30px, -15px); }
        }

        .split-container { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 1; }

        /* --- SIDES --- */
        .side {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; 
            transition: flex 1s var(--easing), filter 1s var(--easing), opacity 1s ease;
            position: relative; overflow: hidden;
            background: transparent;
        }
        
        /* The Interactive Spotlight Layer */
        .side::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; 
            transition: transform 1s var(--easing), opacity 0.8s var(--easing);
            opacity: 0; 
            transform: scale(1);
        }

        /* Left Side: Investor (Light Blue) */
        /* Lightened the dark gradient slightly so the map shows through better */
        .investor-side { background: linear-gradient(135deg, rgba(0, 210, 255, 0.08) 0%, rgba(0,0,0,0.4) 100%); border-right: 1px solid rgba(255,255,255,0.05); }
        .investor-side::before { 
            background: radial-gradient(circle 800px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0, 210, 255, 0.4), transparent 80%); 
        }

        /* Right Side: Developer (Dark Blue) */
        .developer-side { background: linear-gradient(225deg, rgba(0, 34, 119, 0.2) 0%, rgba(0,0,0,0.4) 100%); }
        .developer-side::before { 
            background: radial-gradient(circle 800px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0, 68, 255, 0.5), transparent 80%); 
        }

        /* --- SPOTLIGHT HOVER EFFECT --- */
        .split-container:hover .side { filter: brightness(0.4) grayscale(40%); }
        .split-container .side:hover { filter: brightness(1.2) grayscale(0%); flex: 1.4; }
        .investor-side:hover::before, .developer-side:hover::before { opacity: 1; transform: scale(1.1); }

        /* --- TEXT CONTENT --- */
        .content { 
            text-align: center; 
            z-index: 20; 
            position: relative;
            pointer-events: none; 
            transition: transform 0.8s var(--easing), opacity 0.4s ease; 
        }

        /* Push text away from the center */
        .investor-side .content { transform: translateX(-60px); }
        .developer-side .content { transform: translateX(60px); }

        /* Hover states */
        .investor-side:hover .content { transform: scale(1.05) translateX(-80px); }
        .developer-side:hover .content { transform: scale(1.05) translateX(80px); }

        h2 { 
            font-size: 4.5rem; font-weight: 700; margin: 0 0 5px; text-transform: uppercase; 
            letter-spacing: -1px; transition: all 0.6s var(--easing); color: rgba(255,255,255,0.8); 
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .investor-side h2 { text-shadow: 0 0 30px rgba(0, 210, 255, 0.3); }
        .developer-side h2 { text-shadow: 0 0 30px rgba(0, 34, 119, 0.5); }

        .investor-side:hover h2 { color: #fff; letter-spacing: 3px; text-shadow: 0 0 50px var(--light-blue); }
        .developer-side:hover h2 { color: #fff; letter-spacing: 3px; text-shadow: 0 0 50px #4d88ff; }

        p { 
            font-size: 1.2rem; opacity: 0; font-weight: 600; margin: 0; 
            text-transform: uppercase; letter-spacing: 5px; transform: translateY(20px);
            transition: all 0.6s var(--easing) 0.1s; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .investor-side p { color: #ccf5ff; }
        .developer-side p { color: #b3ccff; }
        .side:hover p { opacity: 1; transform: translateY(0); }

        /* --- EMERGING TAKEOVER ANIMATIONS --- */
        .side.takeover { flex: 100 !important; z-index: 10; filter: brightness(1.2) grayscale(0%) !important; border: none; }
        .side.shrink { flex: 0.0001 !important; opacity: 0; }

        .side.takeover::before { transform: scale(3.5) !important; opacity: 1 !important; }
        .side.takeover .content { transform: scale(1.6) !important; opacity: 0 !important; }
        .side.shrink .content { transform: scale(0.6) !important; opacity: 0 !important; }

        /* --- THE MASSIVE REACTIVE PORTAL IMAGE --- */
        .yin-yang-wrapper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; z-index: 5; pointer-events: none; 
            animation: floatYY 6s ease-in-out infinite; 
        }
        
        @keyframes floatYY {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -54%); }
        }

        /* Container is completely clean now. NO border, NO background, NO shadow. */
        .portal-circle {
            width: 100%; height: 100%;
            position: relative; 
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; justify-content: center; align-items: center;
        }

        /* The glow is perfectly wrapped around the shape of the PNG image */
        .yin-yang-image {
            width: 130%; 
            height: 130%;
            object-fit: contain; 
            transform: rotate(180deg); /* Keeps light side on the left */
            /* This directly targets the graphic, completely ignoring the invisible padding! */
            filter: drop-shadow(-15px 0 25px rgba(0, 210, 255, 0.6)) 
                    drop-shadow(15px 0 25px rgba(0, 34, 119, 0.8));
        }

        .spin-action { animation: spinAndShrink 0.9s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards; }
        @keyframes spinAndShrink { 
            0% { transform: rotate(0deg) scale(1); opacity: 1; }
            100% { transform: rotate(1080deg) scale(0); opacity: 0; }
        }

        @media (max-width: 768px) {
            .split-container { flex-direction: column; }
            .investor-side { background: transparent; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .investor-side::before { background: radial-gradient(circle at 50% 100%, rgba(0, 210, 255, 0.5), transparent 80%); }
            .developer-side { background: transparent; }
            .developer-side::before { background: radial-gradient(circle at 50% 0%, rgba(0, 68, 255, 0.6), transparent 80%); }
            
            .brand-header { top: 25px; } 
            .premium-logo img { height: 35px; }
            
            .investor-side .content { transform: translateY(-40px) translateX(0); }
            .developer-side .content { transform: translateY(40px) translateX(0); }
            .investor-side:hover .content { transform: scale(1.05) translateY(-50px) translateX(0); }
            .developer-side:hover .content { transform: scale(1.05) translateY(50px) translateX(0); }

            h2 { font-size: 3rem; } p { font-size: 1rem; opacity: 0.8; transform: translateY(0); }
            .yin-yang-wrapper { width: 140px; height: 140px; transform: translate(-50%, -50%) rotate(90deg); animation: none; }
            .side.takeover { flex: 100 !important; }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="premium-logo">
            <img src="https://res.cloudinary.com/dozcviag7/image/upload/v1774248121/NiksGlobal_Capital-01_dzbqx3.png" alt="NIKSGLOBAL CAPITAL">
        </div>
        <span>Niksglobal Capital</span>
    </div>

    <div class="map-bg"></div>

    <div class="split-container">
        
        <div class="side investor-side" id="leftSide" onclick="takeOver('left', 'investor.html')">
            <div class="content">
                <h2>Investor</h2>
                <p>Discover Premium Assets</p>
            </div>
        </div>

        <div class="side developer-side" id="rightSide" onclick="takeOver('right', 'developer.html')">
            <div class="content">
                <h2>Developer</h2>
                <p>Global Partnerships</p>
            </div>
        </div>

        <div class="yin-yang-wrapper">
            <div class="portal-circle" id="yyElement">
                <img src="https://res.cloudinary.com/dozcviag7/image/upload/v1774254405/Yin-Yaang_1_wxgds4.png" alt="Yin Yang Portal" class="yin-yang-image">
            </div>
        </div>

    </div>

    <script>
        const leftSide = document.getElementById('leftSide');
        const rightSide = document.getElementById('rightSide');
        const yyElement = document.getElementById('yyElement');
        const brandHeader = document.querySelector('.brand-header');

        function updateMousePosition(e) {
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            this.style.setProperty('--mouse-x', `${x}px`);
            this.style.setProperty('--mouse-y', `${y}px`);
        }

        leftSide.addEventListener('mousemove', updateMousePosition);
        rightSide.addEventListener('mousemove', updateMousePosition);

        leftSide.addEventListener('mouseenter', () => {
            if(!yyElement.classList.contains('spin-action')) {
                yyElement.style.transform = 'rotate(-25deg) scale(1.15)';
            }
        });
        leftSide.addEventListener('mouseleave', () => {
            if(!yyElement.classList.contains('spin-action')) {
                yyElement.style.transform = 'rotate(0deg) scale(1)';
            }
        });

        rightSide.addEventListener('mouseenter', () => {
            if(!yyElement.classList.contains('spin-action')) {
                yyElement.style.transform = 'rotate(25deg) scale(1.15)';
            }
        });
        rightSide.addEventListener('mouseleave', () => {
            if(!yyElement.classList.contains('spin-action')) {
                yyElement.style.transform = 'rotate(0deg) scale(1)';
            }
        });

        function takeOver(side, url) {
            // Spin and shrink the center element
            yyElement.classList.add('spin-action');
            
            // Fade out the logo cleanly
            brandHeader.style.transition = "opacity 0.4s ease";
            brandHeader.style.opacity = "0";

            // Trigger the expansion dive animation
            if(side === 'left') {
                leftSide.classList.add('takeover');
                rightSide.classList.add('shrink');
            } else {
                rightSide.classList.add('takeover');
                leftSide.classList.add('shrink');
            }

            // Route to the exact portal after animation peak
            setTimeout(() => {
                window.location.href = url;
            }, 900); // perfectly synced with 1s CSS ease
        }
    </script>

</body>
</html>
